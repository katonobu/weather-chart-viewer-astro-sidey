name: Build and Deploy

on:
  # 手動起動の時はDropDownから選択
  workflow_dispatch:
    inputs:
      stage:
        description: 'Deploy stage'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prd

  # スクレイピング後に呼ばれる場合 ⇒ prdで実行
  workflow_call:

  # mainに対するpush ⇒ devで実行
  push:
    branches:
      - main

env:
  STAGE: ${{ github.event_name == 'workflow_call' && 'prd' || github.event_name == 'push' && 'dev' || github.event.inputs.stage }}
  SERVICE: weatherchart
  AWS_REGION: ap-northeast-1

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Display service,STAGE
        run: |
          # 環境変数の表示
          echo "Service: ${{ env.SERVICE }}"
          echo "STAGE: ${{ env.STAGE }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: katonobu/weather-chart-viewer-astro-sidey
          ref: main

      - name: Build Astro
        run: |
          npm install
          NEW_ENTRY_ID=ALL npm run build-${{ env.STAGE }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVICE }}-${{ env.STAGE }}
          path: dist
          retention-days: 15          

      # =========================
      # stageごとの設定切替
      # =========================
      - name: Set stage config
        id: stage
        run: |
          echo "STAGE=$STAGE" >> $GITHUB_ENV

          if [ "$STAGE" = "prd" ]; then
            echo "ACCOUNT_ID=179698341762" >> $GITHUB_ENV
            echo "DIST_ID=E3W1M78O72OP78" >> $GITHUB_ENV
          elif [ "$STAGE" = "stg" ]; then
            echo "ACCOUNT_ID=108241940789" >> $GITHUB_ENV
            echo "DIST_ID=E2DYA9BWGLHDV7" >> $GITHUB_ENV
          else
            echo "ACCOUNT_ID=357665575661" >> $GITHUB_ENV
            echo "DIST_ID=E3KCZCB6BTKPI9" >> $GITHUB_ENV
          fi

      # =========================
      # AWS認証（OIDC）
      # =========================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.SERVICE }}CodeGitHubRole

      # =========================
      # S3 deploy
      # =========================
      - name: Deploy to S3
        run: |
          aws s3 cp dist s3://frontend-${{ env.STAGE }}-${{ env.SERVICE }}-site/ --recursive

      # =========================
      # CloudFront invalidate
      # =========================
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.DIST_ID }} \
            --paths "/*" "/recent/*" "/archive/*" "/view/*" "/details/*"